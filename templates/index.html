<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ project_name }} - 局域网系统监控面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="bg-glow bg-glow-a"></div>
    <div class="bg-glow bg-glow-b"></div>

    <main class="container">
        <header class="header card">
            <div>
                <h1>nodeWatch</h1>
                <p>局域网系统监控面板</p>
            </div>
            <div class="status-meta">
                <span id="connBadge" class="badge">连接中...</span>
                <span id="lastUpdate" class="subtle">最后更新: --:--:--</span>
            </div>
        </header>

        <section class="stats-grid">
            <article class="stat card">
                <h2>CPU</h2>
                <div class="stat-value" id="cpuValue">0%</div>
                <div class="stat-foot">实时使用率</div>
            </article>

            <article class="stat card">
                <h2>内存</h2>
                <div class="stat-value" id="memValue">0%</div>
                <div class="stat-foot" id="memDetail">0 MB / 0 MB</div>
            </article>

            <article class="stat card">
                <h2>GPU</h2>
                <div class="stat-value" id="gpuValue">--</div>
                <div class="stat-foot" id="gpuDetail">检测中...</div>
            </article>
        </section>

        <section class="charts-grid">
            <article class="card chart-card">
                <div class="card-title">CPU 使用率曲线</div>
                <canvas id="cpuChart"></canvas>
            </article>
            <article class="card chart-card">
                <div class="card-title">GPU 使用率曲线</div>
                <canvas id="gpuChart"></canvas>
            </article>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
</body>

</html>
